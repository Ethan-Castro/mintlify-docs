<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Empire AI service & support flow</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #e5e7eb;
    --ink: #0f172a;
    --ink-2: #334155;
    --muted: #64748b;
    --accent: #7abde8;
    --accent-bg: #f0f9ff;
    --accent-deep: #1f4f7a;
    --empire: #b88aff;
    --user: #7abde8;
    --support: #b88aff;
    --review: #d97706;
    --storage: #16a34a;
    --compute: #f5a96b;
    --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 4px 16px rgba(15,23,42,0.06);
    --radius: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f111a;
      --surface: #131620;
      --surface-2: #1e2132;
      --border: #2d3142;
      --ink: #f8fafc;
      --ink-2: #cbd5e1;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-bg: rgba(56, 189, 248, 0.15);
      --accent-deep: #7dd3fc;
      --empire: #c084fc;
      --user: #38bdf8;
      --support: #c084fc;
      --review: #fbbf24;
      --storage: #4ade80;
      --compute: #fb923c;
      --shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--surface-2);
    font-size: 14px;
    line-height: 1.45;
    transition: background 300ms ease, color 300ms ease;
  }

  .frame {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    background: var(--surface-2);
    transition: background 300ms ease;
  }

  header.titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
    transition: background 300ms ease, border-color 300ms ease;
  }

  .titlebar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
    transition: color 300ms ease;
  }

  .controls {
    display: flex;
    gap: 8px;
  }

  .controls button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    background: var(--surface);
    color: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 120ms, color 120ms, border-color 120ms;
  }

  .controls button:hover {
    background: var(--surface-2);
    color: var(--ink);
    border-color: var(--muted);
  }

  .controls button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  main.body {
    display: flex;
    flex: 1 1 auto;
    min-height: 0;
    gap: 16px;
    padding: 16px;
  }

  .pane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-height: 0;
    transition: background 300ms ease, border-color 300ms ease, box-shadow 300ms ease;
  }

  .pane-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex: 0 0 auto;
    transition: border-color 300ms ease, color 300ms ease;
  }

  /* ---- chat log (left) ---- */
  .pane.chat {
    flex: 0 0 55%;
    overflow: hidden;
  }

  .chat-log {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .chat-log::-webkit-scrollbar { width: 8px; }
  .chat-log::-webkit-scrollbar-track { background: transparent; }
  .chat-log::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--muted);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 300ms ease, transform 300ms ease, background 300ms ease, border-color 300ms ease, box-shadow 300ms ease;
  }

  .card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .card[data-kind="user"]    { border-left-color: var(--user); }
  .card[data-kind="support"] { border-left-color: var(--support); }
  .card[data-kind="review"]  { border-left-color: var(--review); }
  .card[data-kind="storage"] { border-left-color: var(--storage); }
  .card[data-kind="compute"] { border-left-color: var(--compute); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    transition: color 300ms ease;
  }

  .card-day {
    background: var(--surface-2);
    color: var(--ink-2);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    transition: background 300ms ease, color 300ms ease, border-color 300ms ease;
  }

  .card-route {
    color: var(--ink-2);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12px;
    transition: color 300ms ease;
  }

  .card-route .arrow {
    color: var(--muted);
    margin: 0 4px;
    transition: color 300ms ease;
  }

  .card-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    transition: color 300ms ease;
  }

  .card-icon {
    font-size: 16px;
    line-height: 1;
  }

  .card-plain {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
    transition: color 300ms ease;
  }

  /* ---- service map (right) ---- */
  .pane.map {
    flex: 1 1 40%;
    overflow: hidden;
  }

  .map-canvas {
    flex: 1 1 auto;
    position: relative;
    min-height: 0;
  }

  .map-canvas svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  .node-pill rect {
    fill: var(--surface);
    stroke: var(--border);
    stroke-width: 1.5;
    transition: fill 300ms ease, stroke 300ms ease, stroke-width 200ms ease;
  }

  .node-pill text {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    fill: var(--ink);
    pointer-events: none;
    transition: fill 300ms ease;
  }

  .node-pill .dot {
    stroke: var(--surface);
    stroke-width: 1.5;
    transition: stroke 300ms ease;
  }

  .node-pill.pulse rect {
    stroke-width: 3;
    animation: pulseRing 700ms ease-out;
  }

  @keyframes pulseRing {
    0%   { filter: drop-shadow(0 0 0 rgba(31,79,122,0.0)); }
    40%  { filter: drop-shadow(0 0 6px var(--accent-bg)); }
    100% { filter: drop-shadow(0 0 0 rgba(31,79,122,0.0)); }
  }

  .arc {
    fill: none;
    stroke-linecap: round;
    stroke-width: 2.5;
    opacity: 0;
    filter: drop-shadow(0 0 4px var(--accent-bg));
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    font-size: 11px;
    color: var(--ink-2);
    flex: 0 0 auto;
    transition: background 300ms ease, border-color 300ms ease, color 300ms ease;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    display: inline-block;
  }

  .progress {
    flex: 0 0 auto;
    height: 3px;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    overflow: hidden;
    transition: background 300ms ease, border-color 300ms ease;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--empire));
    width: 0%;
    transition: width 300ms ease;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* responsive */
  @media (max-width: 820px) {
    main.body { flex-direction: column; }
    .pane.chat, .pane.map { flex: 1 1 auto; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
    .node-pill.pulse rect { animation: none; }
    .chat-log { scroll-behavior: auto; }
    .arc { filter: none; }
  }
</style>
</head>
<body>
<div class="frame" role="application" aria-label="Empire AI service and support flow animation">

  <header class="titlebar">
    <h1>How an Empire AI project flows through the support chain</h1>
    <div class="controls">
      <button id="btn-pause" type="button" aria-label="Pause animation">Pause</button>
      <button id="btn-replay" type="button" aria-label="Replay animation">Replay</button>
    </div>
  </header>

  <main class="body">

    <section class="pane chat" aria-label="Event log">
      <div class="pane-header">Story</div>
      <div id="chat-log"
           class="chat-log"
           role="log"
           aria-live="polite"
           aria-relevant="additions"></div>
    </section>

    <section class="pane map" aria-label="Service map">
      <div class="pane-header">Service map</div>
      <div class="map-canvas">
        <svg id="svg-map" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet"
             role="img" aria-label="Service nodes and connection arcs">
          <g id="arcs-layer"></g>
          <g id="nodes-layer"></g>
        </svg>
      </div>
      <div class="legend" aria-label="Legend">
        <span class="legend-item"><span class="legend-swatch" style="background: var(--user)"></span>You (PI)</span>
        <span class="legend-item"><span class="legend-swatch" style="background: var(--support)"></span>Support</span>
        <span class="legend-item"><span class="legend-swatch" style="background: var(--review)"></span>Review</span>
        <span class="legend-item"><span class="legend-swatch" style="background: var(--storage)"></span>Storage</span>
        <span class="legend-item"><span class="legend-swatch" style="background: var(--compute)"></span>Compute</span>
      </div>
    </section>

  </main>

  <div class="progress" aria-hidden="true">
    <div id="progress-bar" class="progress-bar"></div>
  </div>

</div>

<script>
(function () {
  "use strict";

  // ---------- data ----------
  const SERVICES = [
    { id: "PI",                 label: "You (PI)",          kind: "user",    x: 0.50, y: 0.50 },
    { id: "HPCC Bridge",        label: "HPCC Bridge",       kind: "support", x: 0.20, y: 0.50 },
    { id: "Campus Review",      label: "Campus Review",     kind: "review",  x: 0.50, y: 0.15 },
    { id: "Umbrella Review",    label: "Umbrella Review",   kind: "review",  x: 0.50, y: 0.32 },
    { id: "CCR Support",        label: "CCR Support",       kind: "support", x: 0.85, y: 0.40 },
    { id: "Empire AI Support",  label: "Empire AI Support", kind: "support", x: 0.85, y: 0.60 },
    { id: "Transfer Service",   label: "Transfer Service",  kind: "storage", x: 0.50, y: 0.78 },
    { id: "Alpha+ Cluster",     label: "Alpha+ Cluster",    kind: "compute", x: 0.50, y: 0.92 },
  ];

  const EVENTS = [
    { day: 0,  from: "PI",                to: "HPCC Bridge",        icon: "\u{1F4AC}", title: "Need guidance",
      plain: "You ask the HPCC bridge team for guidance on whether your project fits Empire AI." },
    { day: 2,  from: "PI",                to: "Campus Review",      icon: "✉",    title: "Submit proposal",
      plain: "You submit a formal proposal to your campus review committee." },
    { day: 8,  from: "Campus Review",     to: "Umbrella Review",    icon: "✉",    title: "Forward recommendation",
      plain: "Campus committee approves and forwards the proposal to the Empire AI consortium board." },
    { day: 14, from: "Umbrella Review",   to: "CCR Support",        icon: "★",    title: "Allocation awarded",
      plain: "Consortium board awards the allocation; CCR Support takes over operational onboarding." },
    { day: 16, from: "CCR Support",       to: "Empire AI Support",  icon: "\u{1F3AB}", title: "Create accounts",
      plain: "CCR Support files a ticket asking Empire AI Support to create your team's accounts." },
    { day: 20, from: "Empire AI Support", to: "PI",                 icon: "\u{1F44B}", title: "Activation instructions",
      plain: "Empire AI Support emails you activation instructions: SSH keys, ColdFront link, first-login walkthrough." },
    { day: 24, from: "PI",                to: "Transfer Service",   icon: "⇌",    title: "Upload training data",
      plain: "You start uploading your training data through Globus to Empire AI's storage." },
    { day: 28, from: "PI",                to: "Alpha+ Cluster",     icon: "▶",    title: "Submit first run",
      plain: "You submit your first SLURM job on Alpha+." },
    { day: 31, from: "PI",                to: "Empire AI Support",  icon: "⚠",    title: "Queue wait question",
      plain: "Job sits in the queue longer than you expected; you open a ticket to ask why." },
    { day: 33, from: "Empire AI Support", to: "CCR Support",        icon: "↑",    title: "Escalate for context",
      plain: "Empire AI Support escalates to CCR Support for cluster-level context they can't see directly." },
    { day: 37, from: "CCR Support",       to: "PI",                 icon: "✓",    title: "Resolution: use smoke-test path",
      plain: "CCR Support recommends submitting a small smoke-test job to a faster queue first; you confirm and continue." },
  ];

  // ---------- validation ----------
  const KNOWN_IDS = new Set(SERVICES.map(s => s.id));
  EVENTS.forEach((e, i) => {
    if (!KNOWN_IDS.has(e.from)) {
      throw new Error(
        `Event ${i} (day ${e.day}, "${e.title}"): unknown 'from' service id "${e.from}". ` +
        `Known ids: ${[...KNOWN_IDS].join(", ")}`
      );
    }
    if (!KNOWN_IDS.has(e.to)) {
      throw new Error(
        `Event ${i} (day ${e.day}, "${e.title}"): unknown 'to' service id "${e.to}". ` +
        `Known ids: ${[...KNOWN_IDS].join(", ")}`
      );
    }
  });

  // ---------- color helpers ----------
  const KIND_COLORS = {
    user:    "var(--user)",
    support: "var(--support)",
    review:  "var(--review)",
    storage: "var(--storage)",
    compute: "var(--compute)",
  };

  const SERVICE_BY_ID = new Map(SERVICES.map(s => [s.id, s]));
  function nodeById(id) { return SERVICE_BY_ID.get(id); }
  function kindOf(id)   { return nodeById(id).kind; }

  // arc color follows the SOURCE node kind (where the action originates)
  function eventColor(ev) {
    return KIND_COLORS[kindOf(ev.from)] || "var(--muted)";
  }

  // ---------- service map ----------
  const VIEW_W = 400;
  const VIEW_H = 500;
  const PILL_W = 120;
  const PILL_H = 30;

  const svg    = d3.select("#svg-map");
  const arcsG  = d3.select("#arcs-layer");
  const nodesG = d3.select("#nodes-layer");

  // pre-compute pill centers in viewBox space
  SERVICES.forEach(s => {
    s._cx = s.x * VIEW_W;
    s._cy = s.y * VIEW_H;
  });

  // edge intersection: clip a line from node center toward (tx,ty) to the pill rectangle border
  function edgePoint(node, towardX, towardY) {
    const cx = node._cx;
    const cy = node._cy;
    const dx = towardX - cx;
    const dy = towardY - cy;
    if (dx === 0 && dy === 0) return [cx, cy];
    const halfW = PILL_W / 2;
    const halfH = PILL_H / 2;
    const sx = dx === 0 ? Infinity : halfW / Math.abs(dx);
    const sy = dy === 0 ? Infinity : halfH / Math.abs(dy);
    const t = Math.min(sx, sy);
    return [cx + dx * t, cy + dy * t];
  }

  // draw service nodes
  const nodeSel = nodesG.selectAll("g.node-pill")
    .data(SERVICES, d => d.id)
    .enter()
    .append("g")
    .attr("class", "node-pill")
    .attr("data-id", d => d.id)
    .attr("transform", d => `translate(${d._cx - PILL_W/2}, ${d._cy - PILL_H/2})`);

  nodeSel.append("title").text(d => `${d.label} (${d.kind})`);

  nodeSel.append("rect")
    .attr("width", PILL_W)
    .attr("height", PILL_H)
    .attr("rx", PILL_H / 2)
    .attr("ry", PILL_H / 2);

  nodeSel.append("circle")
    .attr("class", "dot")
    .attr("cx", 14)
    .attr("cy", PILL_H / 2)
    .attr("r", 5)
    .attr("fill", d => KIND_COLORS[d.kind]);

  nodeSel.append("text")
    .attr("x", 26)
    .attr("y", PILL_H / 2)
    .attr("dominant-baseline", "central")
    .text(d => d.label);

  function cssEscape(s) {
    return (window.CSS && window.CSS.escape) ? window.CSS.escape(s) : s.replace(/(["\\])/g, "\\$1");
  }

  function pulseNode(id) {
    const node = nodesG.select(`g.node-pill[data-id="${cssEscape(id)}"]`);
    if (node.empty()) return;
    node.classed("pulse", false);
    // force reflow so the animation restarts cleanly
    void node.node().getBoundingClientRect();
    node.classed("pulse", true);
    setTimeout(() => node.classed("pulse", false), 750);
  }

  // ---------- arcs ----------
  function arcPath(fromNode, toNode) {
    const [sx, sy] = edgePoint(fromNode, toNode._cx, toNode._cy);
    const [tx, ty] = edgePoint(toNode,   fromNode._cx, fromNode._cy);
    const dx = tx - sx;
    const dy = ty - sy;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    // gentle perpendicular curve
    const curve = Math.min(60, dist * 0.25);
    const mx = (sx + tx) / 2;
    const my = (sy + ty) / 2;
    const px = -dy / dist;
    const py =  dx / dist;
    const cx = mx + px * curve;
    const cy = my + py * curve;
    return `M ${sx} ${sy} Q ${cx} ${cy} ${tx} ${ty}`;
  }

  function drawArc(ev, prefersReducedMotion) {
    const fromNode = nodeById(ev.from);
    const toNode   = nodeById(ev.to);
    const color    = eventColor(ev);

    // keep map uncluttered: clear prior arc
    arcsG.selectAll("path.arc").remove();

    const path = arcsG.append("path")
      .attr("class", "arc")
      .attr("d", arcPath(fromNode, toNode))
      .attr("stroke", color);

    if (prefersReducedMotion) {
      path.style("opacity", 1);
      return Promise.resolve();
    }

    // stroke-dasharray "trace" effect
    const len = path.node().getTotalLength();
    path.style("opacity", 1)
        .attr("stroke-dasharray", `${len} ${len}`)
        .attr("stroke-dashoffset", len);

    return new Promise(resolve => {
      path.transition()
        .duration(700)
        .ease(d3.easeCubicInOut)
        .attr("stroke-dashoffset", 0)
        .on("end", resolve)
        .on("interrupt", resolve);
    });
  }

  // ---------- chat log ----------
  const chatLog = document.getElementById("chat-log");

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,  "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }

  function buildCard(ev) {
    const card = document.createElement("article");
    card.className = "card";
    card.dataset.kind = kindOf(ev.from);

    const meta = document.createElement("div");
    meta.className = "card-meta";

    const day = document.createElement("span");
    day.className = "card-day";
    day.textContent = `Day ${ev.day}`;
    meta.appendChild(day);

    const route = document.createElement("span");
    route.className = "card-route";
    route.innerHTML = `${escapeHtml(ev.from)} <span class="arrow" aria-hidden="true">→</span> ${escapeHtml(ev.to)}`;
    meta.appendChild(route);

    const title = document.createElement("div");
    title.className = "card-title";
    const icon = document.createElement("span");
    icon.className = "card-icon";
    icon.setAttribute("aria-hidden", "true");
    icon.textContent = ev.icon;
    const titleText = document.createElement("span");
    titleText.textContent = ev.title;
    title.appendChild(icon);
    title.appendChild(titleText);

    const plain = document.createElement("div");
    plain.className = "card-plain";
    plain.textContent = ev.plain;

    card.appendChild(meta);
    card.appendChild(title);
    card.appendChild(plain);

    return card;
  }

  function appendCard(ev) {
    const card = buildCard(ev);
    chatLog.appendChild(card);
    // force reflow so transition fires
    void card.offsetWidth;
    requestAnimationFrame(() => {
      card.classList.add("visible");
      chatLog.scrollTop = chatLog.scrollHeight;
    });
  }

  // ---------- runner with pause/resume ----------
  const HOLD_MS = 3000;
  const CARD_MS = 300;

  const prefersReducedMotion = !!(window.matchMedia
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches);

  const progressBar = document.getElementById("progress-bar");
  const btnPause    = document.getElementById("btn-pause");
  const btnReplay   = document.getElementById("btn-replay");

  let runId       = 0;
  let stepIdx     = 0;
  let paused      = false;
  let activeTimer = null;
  let activeResolve = null;
  let activeRemaining = 0;
  let activeStart = 0;
  let pausedTransitions = []; // d3 transitions to pause via interrupt

  function sleep(ms) {
    return new Promise(resolve => {
      activeRemaining = ms;
      activeStart = Date.now();
      activeResolve = resolve;
      if (paused) {
        // wait for resume() to schedule the timer
      } else {
        activeTimer = setTimeout(() => {
          activeTimer = null;
          activeResolve = null;
          resolve();
        }, ms);
      }
    });
  }

  function pause() {
    if (paused) return;
    paused = true;
    if (activeTimer) {
      clearTimeout(activeTimer);
      activeTimer = null;
      activeRemaining = Math.max(0, activeRemaining - (Date.now() - activeStart));
    }
    btnPause.textContent = "Resume";
    btnPause.setAttribute("aria-label", "Resume animation");
  }

  function resume() {
    if (!paused) return;
    paused = false;
    btnPause.textContent = "Pause";
    btnPause.setAttribute("aria-label", "Pause animation");
    if (activeResolve) {
      const r = activeResolve;
      activeStart = Date.now();
      activeTimer = setTimeout(() => {
        activeTimer = null;
        activeResolve = null;
        r();
      }, activeRemaining);
    }
  }

  function updateProgress() {
    const pct = (stepIdx / EVENTS.length) * 100;
    progressBar.style.width = pct.toFixed(1) + "%";
  }

  async function runStep(ev) {
    appendCard(ev);
    await sleep(CARD_MS);

    pulseNode(ev.from);
    await sleep(120);

    await drawArc(ev, prefersReducedMotion);

    pulseNode(ev.to);

    await sleep(HOLD_MS);
  }

  async function runAll() {
    const myRun = ++runId;
    for (stepIdx = 0; stepIdx < EVENTS.length; stepIdx++) {
      if (myRun !== runId) return;
      await runStep(EVENTS[stepIdx]);
      stepIdx + 1; // no-op, kept for clarity
      updateProgress();
      if (myRun !== runId) return;
    }
    progressBar.style.width = "100%";
  }

  function reset() {
    runId++;
    stepIdx = 0;
    if (activeTimer) {
      clearTimeout(activeTimer);
      activeTimer = null;
    }
    activeResolve = null;
    paused = false;
    btnPause.textContent = "Pause";
    btnPause.setAttribute("aria-label", "Pause animation");
    chatLog.innerHTML = "";
    arcsG.selectAll("path.arc").interrupt().remove();
    nodesG.selectAll("g.node-pill").classed("pulse", false);
    progressBar.style.width = "0%";
  }

  // ---------- wire controls ----------
  btnPause.addEventListener("click", () => {
    if (paused) resume(); else pause();
  });

  btnReplay.addEventListener("click", () => {
    reset();
    runAll();
  });

  // ---------- go ----------
  requestAnimationFrame(() => {
    runAll();
  });

})();
</script>
</body>
</html>
